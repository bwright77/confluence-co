- id: lgcp-community-meeting-may-2026
  date: "2026-05-15"
  title: Steering Committee gathered in the park
  body: |
    The Lorraine Granado Community Park Steering Committee held our monthly meeting *in* the park this week — a circle of folding chairs under the new shade cover, with neighbors stopping by to share what they want to see restored. Translation earpieces, program flyers in English and Spanish, and a lot of ideas.

    The survey is still open. If you live in Globeville-Elyria-Swansea, your voice shapes the next phase.
  image: /projects/lgcp/community-meeting-circle.jpg
  imageAlt: Swansea residents seated in a wide circle of folding chairs at Lorraine Granado Community Park for a Steering Committee meeting
  link:
    label: Take the survey
    href: /projects/lgcp
  tags:
    - civic-engagement
    - natural-resource-conservation

- id: first-creek-planting-may-2026
  date: "2026-05-16"
  title: Trees in the ground at First Creek
  body: |
    A youth crew joined Friends of the Front Range Wildlife Refuges and the U.S. Fish and Wildlife Service for native tree and shrub plantings along the First Creek corridor at Rocky Mountain Arsenal. We put five large cottonwoods and a dozen native shrubs in the ground to stabilize the bank and rebuild habitat along First Creek — plus lessons about why this creek matters all the way downstream to Commerce City.

    The work continues through the summer.
  image: /projects/first-creek/group-digging.jpg
  imageAlt: Volunteers digging holes along the First Creek corridor for native plantings
  link:
    label: First Creek program
    href: /projects/first-creek-rocky-mountain-arsenal
  tags:
    - watershed-restoration
    - youth-pathways

