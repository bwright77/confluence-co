- id: spray-cwcb-exemplar-award-2025
  date: "2025-11-10"
  title: SPRAY Council wins the 2025 CWCB Exemplar Award
  body: |
    The **South Platte River Advisory Youth (SPRAY) Council** — in partnership with Confluence Colorado — has been honored with the **Exemplar Award** from the **Colorado Water Conservation Board** for 2025. The award recognizes the Council's youth-led, watershed-wide approach to planning, stewardship, and community engagement along the South Platte.

    Huge congratulations to the youth planners who *are* the Council. This is your award.
  image: /news/spray-cwcb-exemplar-award-2025.jpg
  imageAlt: Announcement banner for the 2025 Colorado Water Conservation Board Exemplar Award given to the SPRAY Council
  imageFit: contain
  link:
    label: SPRAY Council program
    href: /projects/spray-council
